<!DOCTYPE html>
<html>

<head>

    <style>

        .main{

            display:flex;

            width:100%;

            height:100vh;
            justify-content:center;
            align-items:center;

            background: linear-gradient(135deg, #0f4c4c 0%, #1fb5a5 100%);
        }
        .login_container{

            display:flex;

            flex-direction:column;

            width:400px;

            height:600px;

            justify-content:center;

            align-items:center;

            box-shadow: 0 0 15px rgba(0,0,0,0.2);

            background-color:#ffffff;
            border-radius:10px;

             margin: 100px auto;

            
        }

        .mailbox{
            
            width:250px;
            height:20px;
            font-size:medium;
            margin-bottom:20px;
            border:none;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            padding :5px;
           font-style: italic;



        }
        .passbox{
            
            width:250px;
            height:20px;
            font-size:medium;
            margin-bottom:20px;
            border:none;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            padding :5px;
           font-style: italic;

        }

        .blogin{
            width:100px;
            height:30px;
            font-size:medium;
            font-weight:bold;
            color:white;
            background-color:#0f4c4c;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .blogin:hover{
            background-color:#1fb5a5;
        }

        .line1{

         font-size:20px;

         font-weight:bold;
         font-family:Arial;

         margin-top:0;
         margin-bottom:40px;
         color:#0f4c4c

        }

            .line2{
    
            font-size:20px;
    
            font-family: Arial;
            color :#1fb5a5;
    
            margin-top:0;
            margin-bottom:20px;
            }
    </style>
 
   
       
        
   




</head>

<body>

    <div class="main">

        <div class="login_container">

               <p class="line2"> Welcome companion  </p>

                <p class="line1">Login to your account</p>

                <input class="mailbox" type="text" id="email" placeholder="email">
                <input class="passbox" type="password" id="password" placeholder="password">
                <button class="blogin">Login</button>

                <p>Don't have an account? <a href="#">Sign up</a></p>


        </div>
    </div>


</body>
</html>
